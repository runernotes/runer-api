name: Docker

# Tagging convention:
#   v1.2.3          → builds image tagged 1.2.3 + latest  → deploys to production
#   v1.2.3-dev.1    → builds image tagged 1.2.3-dev.1 + dev → deploys to dev
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/runernotes/runer-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-dev') }}
            type=raw,value=dev,enable=${{ contains(github.ref_name, '-dev') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-prod:
    name: Deploy (production)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !contains(github.ref_name, '-dev') }}
    steps:
      - name: Trigger deployment webhook
        run: |
          curl --silent --show-error --fail \
            --request GET \
            "${{ secrets.DEPLOY_WEBHOOK_PROD }}"

  deploy-dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ contains(github.ref_name, '-dev') }}
    steps:
      - name: Trigger deployment webhook
        run: |
          curl --silent --show-error --fail \
            --request GET \
            "${{ secrets.DEPLOY_WEBHOOK_DEV }}"

  cleanup:
    name: Clean up old versions
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: runer-api
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
